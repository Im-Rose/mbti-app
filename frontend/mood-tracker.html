<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Tracker - MindWell</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">🧠</span>
                <span class="logo-text">MindWell</span>
            </a>
            <div class="nav-links">
                <a href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="mbti-test.html"><i class="fas fa-clipboard-question"></i> MBTI Test</a>
                <a href="mood-tracker.html" class="active"><i class="fas fa-face-smile"></i> Mood Tracker</a>
                <a href="community.html"><i class="fas fa-users"></i> Community</a>
                <a href="resources.html"><i class="fas fa-book-open"></i> Resources</a>
                <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
                <a href="#" id="logoutBtn" class="logout-link"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
            <div class="nav-buttons">
                <div class="nav-user-info">
                    <i class="fas fa-user"></i>
                    <span id="userNameDisplay">User</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="mood-main">
        <div class="container">
            <div class="mood-header animate-up">
                <h1><i class="fas fa-smile" style="color: var(--accent)"></i> How are you feeling today?</h1>
                <p>Track your mood daily to understand your emotional patterns</p>
            </div>

            <div class="mood-card animate-up" style="animation-delay: 0.1s">
                <div class="mood-input">
                    <label style="font-weight: 800; font-size: 1.1rem; margin-bottom: 1.5rem; display: block;">Select your current mood</label>
                    <div class="mood-buttons">
                        <button class="mood-option" data-mood="Great">
                            <i class="fas fa-laugh-beam"></i>
                            <span>Great</span>
                        </button>
                        <button class="mood-option" data-mood="Good">
                            <i class="fas fa-smile"></i>
                            <span>Good</span>
                        </button>
                        <button class="mood-option" data-mood="OK">
                            <i class="fas fa-meh"></i>
                            <span>OK</span>
                        </button>
                        <button class="mood-option" data-mood="Poor">
                            <i class="fas fa-frown"></i>
                            <span>Poor</span>
                        </button>
                        <button class="mood-option" data-mood="Bad">
                            <i class="fas fa-tired"></i>
                            <span>Bad</span>
                        </button>
                    </div>
                </div>

                <div class="mood-comment" style="margin-top: 2rem;">
                    <label style="font-weight: 700; margin-bottom: 0.75rem; display: block;">Add a note (optional)</label>
                    <textarea id="moodComment" rows="3" placeholder="What's on your mind?"></textarea>
                </div>

                <button class="btn-primary btn-save" id="saveMoodBtn" style="width: 100%; margin-top: 2rem; padding: 1rem;">Save Today's Mood →</button>
            </div>

            <div class="mood-history animate-up" style="animation-delay: 0.2s">
                <div class="card-header" style="border-bottom: none; margin-bottom: 1rem;">
                    <h3><i class="fas fa-history"></i> Recent Mood History</h3>
                </div>
                <div id="moodHistoryList" class="history-list">
                    <p class="empty-state">No mood entries yet. Start tracking today!</p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
